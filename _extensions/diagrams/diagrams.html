<script type="text/javascript">
let _cfCounter = 0;

function initCircleFlow(container) {
  const items = Array.from(container.querySelectorAll('.item'));
  if (items.length === 0) return;

  const n = items.length;
  const cx = 250, cy = 250;
  const maxR = 240;

  const nodeType = container.classList.contains('node-box')  ? 'box'  :
                   container.classList.contains('node-none') ? 'none' : 'circle';
  const arrowType = container.classList.contains('arrow-curved')  ? 'curved'  :
                    container.classList.contains('arrow-thin')    ? 'thin'    :
                    container.classList.contains('arrow-ring')    ? 'ring'    :
                    container.classList.contains('arrow-arc')     ? 'arc'     :
                    container.classList.contains('arrow-double')  ? 'double'  : 'chevron';

  const defaultNodeColor = container.dataset.nodeColor  || '#2e6b8a';
  const arrowColor       = container.dataset.arrowColor || '#2e6b8a';

  let layoutR, nodeRadius;
  if (n === 1) {
    layoutR = 0;
    nodeRadius = maxR;
  } else {
    const s = Math.sin(Math.PI / n);
    layoutR = maxR / (1 + (2 / 3) * s);
    nodeRadius = (2 / 3) * layoutR * s;
  }

  container.style.position = 'relative';
  container.style.width = '500px';
  container.style.height = '500px';

  const positions = items.map((_, i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    return { x: cx + layoutR * Math.cos(angle), y: cy + layoutR * Math.sin(angle), angle };
  });

  const nodeEls = items.map((item, i) => {
    const { x, y } = positions[i];
    const nodeColor = item.getAttribute('color') || item.dataset.color || defaultNodeColor;
    const node = document.createElement('div');
    node.className = 'node node-' + nodeType;
    node.textContent = item.textContent.trim();
    if (nodeType !== 'none') node.style.background = nodeColor;
    node.style.left = x + 'px';
    node.style.top = y + 'px';
    node.style.transform = 'translate(-50%, -50%)';

    if (nodeType === 'box') {
      node.style.width  = (nodeRadius * 1.8) + 'px';
      node.style.height = (nodeRadius * 1.2) + 'px';
      node.style.borderRadius = (nodeRadius * 0.15) + 'px';
    } else {
      node.style.width  = (nodeRadius * 2) + 'px';
      node.style.height = (nodeRadius * 2) + 'px';
    }

    container.appendChild(node);
    item.style.display = 'none';
    return node;
  });

  // Scale font so the longest label fills (but doesn't overflow) the node
  const textMaxW = nodeType === 'box'  ? nodeRadius * 1.8 - 16 :
                   nodeType === 'none' ? 80 :
                   nodeRadius * 2 - 16;
  const baseStyle   = getComputedStyle(nodeEls[0]);
  const baseFontSize = parseFloat(baseStyle.fontSize) || 17.6;
  const fontFamily   = baseStyle.fontFamily  || 'sans-serif';
  const fontWeight   = baseStyle.fontWeight  || '500';
  const cvs = document.createElement('canvas');
  const cctx = cvs.getContext('2d');
  cctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
  const maxTextWidth = Math.max(...nodeEls.map(el => cctx.measureText(el.textContent).width));
  if (maxTextWidth > 0) {
    // Scale to fill the node, but cap upscaling so short labels don't balloon
    const scale = Math.min(textMaxW / maxTextWidth, 2.5);
    nodeEls.forEach(el => el.style.fontSize = (baseFontSize * scale) + 'px');
  }

  if (n === 1) return;

  const uid = 'cf' + (_cfCounter++);

  if (arrowType === 'chevron') {
    renderChevrons(container, positions, n, nodeRadius, arrowColor);
  } else {
    renderSVGArrows(container, positions, n, layoutR, nodeRadius, nodeType, arrowType, cx, cy, uid, arrowColor);
  }
}

// --- Chevron (div-based) ---

function renderChevrons(container, positions, n, nodeRadius, arrowColor) {
  const scale = nodeRadius / 55;
  const w = 36 * scale, h = 28 * scale;

  positions.forEach((from, i) => {
    const to = positions[(i + 1) % n];
    let mx = (from.x + to.x) / 2;
    let my = (from.y + to.y) / 2;
    const angleDeg = Math.atan2(to.y - from.y, to.x - from.x) * 180 / Math.PI;

    if (n === 2) {
      const dx = positions[1].x - positions[0].x;
      const dy = positions[1].y - positions[0].y;
      const len = Math.sqrt(dx * dx + dy * dy);
      const offset = nodeRadius * 0.3;
      const px = -dy / len * offset, py = dx / len * offset;
      mx += i === 0 ? px : -px;
      my += i === 0 ? py : -py;
    }

    const arrow = document.createElement('div');
    arrow.className = 'arrow-shape';
    arrow.style.background = arrowColor;
    arrow.style.width  = w + 'px';
    arrow.style.height = h + 'px';
    arrow.style.left   = mx + 'px';
    arrow.style.top    = my + 'px';
    arrow.style.transform = `translate(-50%, -50%) rotate(${angleDeg}deg)`;
    container.appendChild(arrow);
  });
}

// --- SVG helpers ---

function makeSVGOverlay(container) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '500');
  svg.setAttribute('height', '500');
  svg.style.cssText = 'position:absolute;left:0;top:0;overflow:visible;pointer-events:none;';
  container.insertBefore(svg, container.firstChild);
  return svg;
}

function addArrowMarker(defs, id, color, size, reverse) {
  const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  marker.setAttribute('id', id);
  marker.setAttribute('markerWidth',  size);
  marker.setAttribute('markerHeight', size * 0.75);
  marker.setAttribute('refX', reverse ? '0' : size);
  marker.setAttribute('refY', size * 0.375);
  marker.setAttribute('orient', reverse ? 'auto-start-reverse' : 'auto');
  marker.setAttribute('markerUnits', 'userSpaceOnUse');
  const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  poly.setAttribute('points', `0 0, ${size} ${size * 0.375}, 0 ${size * 0.75}`);
  poly.setAttribute('fill', color);
  marker.appendChild(poly);
  defs.appendChild(marker);
}

function nodeEdgePoint(pos, toward, nodeRadius, nodeType) {
  const dx = toward.x - pos.x, dy = toward.y - pos.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  // box half-diagonal ≈ nodeRadius * 1.08; add padding for a clear gap
  const trim = nodeType === 'none' ? nodeRadius * 0.6 : nodeType === 'box' ? nodeRadius * 1.2 : nodeRadius;
  return { x: pos.x + dx / len * trim, y: pos.y + dy / len * trim };
}

// --- SVG arrow renderers ---

function renderSVGArrows(container, positions, n, layoutR, nodeRadius, nodeType, arrowType, cx, cy, uid, arrowColor) {
  const svg  = makeSVGOverlay(container);
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  svg.appendChild(defs);

  if (arrowType === 'ring') {
    const maskId = uid + '-ring-mask';
    const mask = document.createElementNS('http://www.w3.org/2000/svg', 'mask');
    mask.setAttribute('id', maskId);

    // White background — ring visible everywhere by default
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', '-500'); bg.setAttribute('y', '-500');
    bg.setAttribute('width', '1500'); bg.setAttribute('height', '1500');
    bg.setAttribute('fill', 'white');
    mask.appendChild(bg);

    // Black rect per node — hides the ring inside each node
    const nw = nodeRadius * (nodeType === 'box' ? 1.8 : 2) + 8;
    const nh = nodeRadius * (nodeType === 'box' ? 1.2 : 2) + 8;
    positions.forEach(pos => {
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('x', pos.x - nw / 2); r.setAttribute('y', pos.y - nh / 2);
      r.setAttribute('width', nw); r.setAttribute('height', nh);
      r.setAttribute('fill', 'black');
      mask.appendChild(r);
    });
    defs.appendChild(mask);

    const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    el.setAttribute('cx', cx); el.setAttribute('cy', cy);
    el.setAttribute('r', layoutR);
    el.setAttribute('fill', 'none');
    el.setAttribute('stroke', arrowColor);
    el.setAttribute('stroke-width', '2');
    el.setAttribute('mask', `url(#${maskId})`);
    svg.appendChild(el);
    return;
  }

  if (arrowType === 'arc') {
    const hw = Math.max(8, nodeRadius * 0.18);
    const arrowHeadLen = hw * 2;

    const angleOffset = Math.asin(Math.min(nodeRadius / layoutR, 0.99));
    const startAngle = positions[0].angle + angleOffset;
    const tipAngle   = positions[0].angle + 2 * Math.PI - angleOffset;
    const bodyAngle  = tipAngle - arrowHeadLen / layoutR;

    const rOut = layoutR + hw;
    const rIn  = layoutR - hw;
    const p = (r, a) => `${cx + r * Math.cos(a)} ${cy + r * Math.sin(a)}`;

    const d = [
      `M ${p(rOut, startAngle)}`,
      `A ${rOut} ${rOut} 0 1 1 ${p(rOut, bodyAngle)}`,
      `L ${p(layoutR, tipAngle)}`,
      `L ${p(rIn, bodyAngle)}`,
      `A ${rIn} ${rIn} 0 1 0 ${p(rIn, startAngle)}`,
      'Z'
    ].join(' ');

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', arrowColor);
    path.setAttribute('stroke', 'none');
    svg.appendChild(path);
    return;
  }

  if (arrowType === 'curved') {
    const hw = Math.max(8, nodeRadius * 0.18); // half-width of arrow body
    const arrowHeadLen = hw * 2;               // length of the pointed tip

    const trimR = nodeType === 'none' ? nodeRadius * 0.85 : nodeRadius;
    const angleOffset = Math.asin(Math.min(trimR / layoutR, 0.99));

    positions.forEach((from, i) => {
      const to = positions[(i + 1) % n];
      const fromAngle = from.angle + angleOffset;
      let toAngle = to.angle - angleOffset;
      if (toAngle <= fromAngle) toAngle += 2 * Math.PI;

      // Tip of arrowhead is at toAngle; body ends arrowHeadLen back along the arc
      const tipAngle  = toAngle;
      const bodyAngle = toAngle - arrowHeadLen / layoutR;
      const largeArc  = (bodyAngle - fromAngle > Math.PI) ? 1 : 0;

      const rOut = layoutR + hw;
      const rIn  = layoutR - hw;

      const p = (r, a) => `${cx + r * Math.cos(a)} ${cy + r * Math.sin(a)}`;

      const d = [
        `M ${p(rOut, fromAngle)}`,
        `A ${rOut} ${rOut} 0 ${largeArc} 1 ${p(rOut, bodyAngle)}`,
        `L ${p(layoutR, tipAngle)}`,
        `L ${p(rIn,  bodyAngle)}`,
        `A ${rIn}  ${rIn}  0 ${largeArc} 0 ${p(rIn,  fromAngle)}`,
        'Z'
      ].join(' ');

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', arrowColor);
      path.setAttribute('stroke', 'none');
      svg.appendChild(path);
    });
    return;
  }

  // thin and double — straight lines with arrowheads
  const markerSize = 12;
  addArrowMarker(defs, uid + '-end',   arrowColor, markerSize, false);
  if (arrowType === 'double') addArrowMarker(defs, uid + '-start', arrowColor, markerSize, true);

  positions.forEach((from, i) => {
    const to = positions[(i + 1) % n];
    let p1 = nodeEdgePoint(from, to, nodeRadius, nodeType);
    let p2 = nodeEdgePoint(to, from, nodeRadius, nodeType);

    if (n === 2) {
      const dx = positions[1].x - positions[0].x;
      const dy = positions[1].y - positions[0].y;
      const len = Math.sqrt(dx * dx + dy * dy);
      const offset = nodeRadius * 0.3;
      const px = -dy / len * offset, py = dx / len * offset;
      const sign = i === 0 ? 1 : -1;
      p1 = { x: p1.x + sign * px, y: p1.y + sign * py };
      p2 = { x: p2.x + sign * px, y: p2.y + sign * py };
    }

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', p1.x);
    line.setAttribute('y1', p1.y);
    line.setAttribute('x2', p2.x);
    line.setAttribute('y2', p2.y);
    line.setAttribute('stroke', arrowColor);
    line.setAttribute('stroke-width', '2');
    line.setAttribute('marker-end', `url(#${uid}-end)`);
    if (arrowType === 'double') line.setAttribute('marker-start', `url(#${uid}-start)`);
    svg.appendChild(line);
  });
}

// --- Pie (pie slices) ---

function initPie(container) {
  const items = Array.from(container.querySelectorAll('.item'));
  if (items.length === 0) return;

  const n = items.length;
  const hasGap = container.classList.contains('gap');
  const anyItemGap = items.some(item => item.classList.contains('gap'));
  const sliceOffset = 20;
  const defaultColor = container.dataset.nodeColor || '#2e6b8a';

  const isDonut = container.classList.contains('donut');
  let holeFrac = parseFloat(container.dataset.hole);
  if (isNaN(holeFrac)) holeFrac = 0.55;
  holeFrac = Math.min(0.85, Math.max(0.2, holeFrac));

  // Per-item annotation HTML (from a nested `.annotation` div); null if absent.
  const annHTML = items.map(item => {
    const ann = Array.from(item.children).find(c => c.classList.contains('annotation'));
    return ann ? ann.innerHTML.trim() : null;
  });
  const hasAnn = annHTML.some(a => a !== null);

  // Geometry. When annotated, the donut shrinks and side columns are reserved
  // so the whole figure (donut + callouts) fits a normal content column rather
  // than spilling outside it.
  const ANN_W = 164;   // callout column width (keep in sync with .annotation CSS)
  const ANN_GAP = 24;  // gap between ring edge and callout column
  const OUTER = 8;     // outer margin so callout text doesn't touch the edge
  const PAD = hasAnn ? (ANN_W + ANN_GAP) : 0;
  const r = hasAnn ? 168 : ((hasGap || anyItemGap) ? 210 : 240);
  const rInner = isDonut ? r * holeFrac : 0;

  const cx = hasAnn ? (OUTER + PAD + r) : 250;
  const W  = hasAnn ? (2 * cx) : 500;
  const H  = hasAnn ? 430 : 500;
  const cy = H / 2;

  container.style.position = 'relative';
  container.style.width = W + 'px';
  container.style.height = H + 'px';
  container.style.margin = '0 auto';
  container.style.display = 'block';

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.style.cssText = 'position:absolute;left:0;top:0;overflow:visible;';
  container.appendChild(svg);

  const labelEls = [];
  const annAnchors = [];  // { ex, ey, mid, color, html } per annotated slice

  items.forEach((item, i) => {
    const color = item.getAttribute('color') || item.dataset.color || defaultColor;
    const startAngle = (i / n) * 2 * Math.PI - Math.PI / 2;
    const endAngle   = ((i + 1) / n) * 2 * Math.PI - Math.PI / 2;
    const midAngle   = (startAngle + endAngle) / 2;

    const itemOffset = (hasGap || item.classList.contains('gap')) ? sliceOffset : 0;
    const dx = itemOffset * Math.cos(midAngle);
    const dy = itemOffset * Math.sin(midAngle);
    const ox = cx + dx, oy = cy + dy;

    const x1 = ox + r * Math.cos(startAngle);
    const y1 = oy + r * Math.sin(startAngle);
    const x2 = ox + r * Math.cos(endAngle);
    const y2 = oy + r * Math.sin(endAngle);
    const largeArc = (endAngle - startAngle > Math.PI) ? 1 : 0;

    let d;
    if (n === 1) {
      // Full circle drawn as two semicircle arcs (avoids near-coincident
      // endpoint degeneracy); donut adds a reversed inner circle + evenodd fill.
      const ring = (rad) =>
        `M ${ox - rad} ${oy} A ${rad} ${rad} 0 1 0 ${ox + rad} ${oy} ` +
        `A ${rad} ${rad} 0 1 0 ${ox - rad} ${oy} Z`;
      d = isDonut ? ring(r) + ' ' + ring(rInner) : ring(r);
    } else if (isDonut) {
      const ix1 = ox + rInner * Math.cos(startAngle);
      const iy1 = oy + rInner * Math.sin(startAngle);
      const ix2 = ox + rInner * Math.cos(endAngle);
      const iy2 = oy + rInner * Math.sin(endAngle);
      d = `M ${ix1} ${iy1} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} ` +
          `L ${ix2} ${iy2} A ${rInner} ${rInner} 0 ${largeArc} 0 ${ix1} ${iy1} Z`;
    } else {
      d = `M ${ox} ${oy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', color);
    if (n === 1 && isDonut) path.setAttribute('fill-rule', 'evenodd');
    if (!hasGap) {
      path.setAttribute('stroke', 'white');
      path.setAttribute('stroke-width', '3');
    }
    svg.appendChild(path);

    const labelR = isDonut
      ? (rInner + r) / 2
      : (n === 1 ? 0 : r * 0.6);
    const lx = ox + labelR * Math.cos(midAngle);
    const ly = oy + labelR * Math.sin(midAngle);

    // Shape label = item text minus any nested .annotation content
    let labelText = item.textContent.trim();
    if (annHTML[i] !== null) {
      const clone = item.cloneNode(true);
      Array.from(clone.children)
        .filter(c => c.classList.contains('annotation'))
        .forEach(c => clone.removeChild(c));
      labelText = clone.textContent.trim();
      // Anchor the leader line at this slice's outer-edge midpoint
      annAnchors.push({
        ex: ox + r * Math.cos(midAngle),
        ey: oy + r * Math.sin(midAngle),
        mid: midAngle,
        color,
        html: annHTML[i]
      });
    }

    const label = document.createElement('div');
    label.className = 'slice-label';
    label.textContent = labelText;
    label.style.left = lx + 'px';
    label.style.top  = ly + 'px';
    container.appendChild(label);
    labelEls.push(label);

    item.style.display = 'none';
  });

  // Scale font so longest label fits within its slice
  const sliceWidth = 2 * r * Math.sin(Math.PI / n) * 0.85;
  const textMaxW = Math.max(60, sliceWidth);
  const baseStyle = getComputedStyle(labelEls[0]);
  const baseFontSize = parseFloat(baseStyle.fontSize) || 17.6;
  const fontFamily = baseStyle.fontFamily || 'sans-serif';
  const fontWeight = baseStyle.fontWeight || '500';
  const cvs = document.createElement('canvas');
  const cctx = cvs.getContext('2d');
  cctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
  const maxTextWidth = Math.max(...labelEls.map(el => cctx.measureText(el.textContent).width));
  if (maxTextWidth > textMaxW && maxTextWidth > 0) {
    const scaledSize = (baseFontSize * textMaxW / maxTextWidth) + 'px';
    labelEls.forEach(el => el.style.fontSize = scaledSize);
  }

  // Center content in the donut hole
  if (isDonut && container.dataset.center) {
    const center = document.createElement('div');
    center.className = 'donut-center';
    center.textContent = container.dataset.center;
    center.style.left = cx + 'px';
    center.style.top  = cy + 'px';
    center.style.maxWidth = (2 * rInner * 0.85) + 'px';
    container.appendChild(center);
  }

  if (hasAnn) placeAnnotations(container, svg, annAnchors, r, H, ANN_GAP);
}

// --- Annotations (external callouts with leader lines) ---
//
// Shared by radial layouts. `anchors` is a list of
//   { ex, ey, mid, color, html }
// where (ex, ey) is the leader-line start on the shape's outer edge, `mid` is
// the angle (used to pick a side), `color` tints the leader line + title, and
// `html` is the callout content. Callouts are stacked on the left/right side so
// they don't overlap. `r` is the shape's outer radius, `H` the container height
// (stack is clamped to it), and `colGap` the gap from the ring to the column.
function placeAnnotations(container, svg, anchors, r, H, colGap) {
  if (anchors.length === 0) return;
  const vGap = 14;            // min vertical gap between stacked callouts

  const right = anchors.filter(a => Math.cos(a.mid) >= 0).sort((a, b) => a.ey - b.ey);
  const left  = anchors.filter(a => Math.cos(a.mid) <  0).sort((a, b) => a.ey - b.ey);

  const placeSide = (list, side) => {
    if (list.length === 0) return;
    const cxRing = list[0].ex - r * Math.cos(list[0].mid); // recover center x
    const colX = side === 'right' ? cxRing + r + colGap : cxRing - r - colGap;

    // Build callouts and measure their heights
    const recs = list.map(a => {
      const el = document.createElement('div');
      el.className = 'annotation annotation-' + side;
      el.style.setProperty('--ann-color', a.color);
      el.style.left = colX + 'px';
      el.innerHTML = a.html;
      container.appendChild(el);
      return { a, el, h: el.offsetHeight };
    });

    // Stack vertically: prefer centering on the anchor, push down on collision
    let prevBottom = -Infinity;
    recs.forEach(rec => {
      let top = rec.a.ey - rec.h / 2;
      if (top < prevBottom + vGap) top = prevBottom + vGap;
      rec.top = top;
      prevBottom = top + rec.h;
    });
    // If the stack overflows the bottom, shift the whole column up
    const overflow = prevBottom - (H - 4);
    if (overflow > 0) recs.forEach(rec => { rec.top -= overflow; });

    recs.forEach(rec => {
      rec.el.style.top = rec.top + 'px';
      const ly = rec.top + rec.h / 2;
      const x2 = side === 'right' ? colX - 8 : colX + 8;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', rec.a.ex);
      line.setAttribute('y1', rec.a.ey);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', ly);
      line.setAttribute('stroke', rec.a.color);
      line.setAttribute('stroke-width', '2');
      svg.insertBefore(line, svg.firstChild);
    });
  };

  placeSide(right, 'right');
  placeSide(left, 'left');
}

// --- Process (linear flow) ---

function initProcess(container) {
  const items = Array.from(container.querySelectorAll('.item'));
  if (items.length === 0) return;

  const n = items.length;
  const vertical = container.classList.contains('vertical');

  const nodeType = container.classList.contains('node-circle') ? 'circle' :
                   container.classList.contains('node-none')   ? 'none'   : 'box';
  const arrowType = container.classList.contains('arrow-thin')   ? 'thin'   :
                    container.classList.contains('arrow-double') ? 'double' : 'chevron';
  const chevron = container.classList.contains('chevron');

  const defaultNodeColor = container.dataset.nodeColor  || '#2e6b8a';
  const arrowColor       = container.dataset.arrowColor || '#2e6b8a';

  // Read container size from CSS (allows user override)
  container.style.position = 'relative';
  const cs = getComputedStyle(container);
  const totalW = parseFloat(cs.width)  || (vertical ? 200 : 900);
  const totalH = parseFloat(cs.height) || (vertical ? 600 : 200);

  const mainAxis = vertical ? totalH : totalW;
  const crossAxis = vertical ? totalW : totalH;

  // Per-item gap multiplier (extra space before .gap items, except the first)
  const gapWeights = items.map((item, i) => (i > 0 && item.classList.contains('gap')) ? 1.6 : 1);
  const totalGapWeight = gapWeights.slice(1).reduce((a, b) => a + b, 0);

  let boxCross, boxMain, arrowSlot = 0, notchPx = 0;
  const centers = [];

  if (chevron) {
    // Chevrons are the steps themselves: big interlocking tiles, no connectors.
    boxCross = Math.min(crossAxis * 0.9, (mainAxis / n) * 0.85);
    boxMain  = mainAxis / n; // refined below to account for overlap + gaps
    notchPx  = boxCross * 0.4;
    const gutter = boxCross * 0.08; // thin slanted gap between tiles so seams read
    const extraGap = boxCross * 0.35;
    const gapPx = gapWeights.map(w => (w - 1) * extraGap);
    const sumGap = gapPx.slice(1).reduce((a, b) => a + b, 0);
    // Tiles interlock (tip nests in next notch) separated by a gutter; fill mainAxis:
    // n*boxMain - (n-1)*(notchPx - gutter) + sumGap = mainAxis
    boxMain = (mainAxis + (n - 1) * (notchPx - gutter) - sumGap) / n;
    let cur = boxMain / 2;
    for (let i = 0; i < n; i++) {
      if (i > 0) cur += (boxMain - notchPx + gutter) + gapPx[i];
      centers.push(cur);
    }
  } else {
    // Allocate: n nodes + (sum of gap weights) arrow-slots fill mainAxis
    // arrowSlot baseline ≈ 0.5 * nodeSize. Solve: n*nodeSize + 0.5*nodeSize*totalGapWeight = mainAxis
    // => nodeSize = mainAxis / (n + 0.5 * totalGapWeight)
    const denom = n + 0.5 * totalGapWeight;
    let nodeSize = mainAxis / denom; // along main axis
    // Cap so node doesn't exceed cross-axis (with some padding)
    const maxAlongCross = crossAxis * 0.9;
    // Node cross-axis size
    boxCross = nodeType === 'box' ? Math.min(maxAlongCross, nodeSize * 0.6) : Math.min(maxAlongCross, nodeSize * 0.85);
    boxMain  = nodeType === 'box' ? nodeSize * 0.85 : boxCross; // box is wider along main; circle/none stays square-ish
    arrowSlot = (mainAxis - n * boxMain) / Math.max(1, totalGapWeight);

    // Compute center positions along main axis
    let cursor = boxMain / 2;
    for (let i = 0; i < n; i++) {
      if (i > 0) cursor += boxMain + arrowSlot * gapWeights[i];
      centers.push(cursor);
    }
  }

  const crossCenter = crossAxis / 2;

  const positions = centers.map(c => vertical ? { x: crossCenter, y: c } : { x: c, y: crossCenter });

  const nodeEls = items.map((item, i) => {
    const { x, y } = positions[i];
    const nodeColor = item.getAttribute('color') || item.dataset.color || defaultNodeColor;
    const node = document.createElement('div');
    node.className = 'node node-' + nodeType;
    node.textContent = item.textContent.trim();
    if (nodeType !== 'none') node.style.background = nodeColor;
    node.style.left = x + 'px';
    node.style.top  = y + 'px';
    node.style.transform = 'translate(-50%, -50%)';

    if (chevron) {
      node.classList.add('chevron-step');
      node.style.background = nodeColor;
      node.style.width  = (vertical ? boxCross : boxMain) + 'px';
      node.style.height = (vertical ? boxMain  : boxCross) + 'px';
      node.style.setProperty('--notch', notchPx + 'px');
      const first = i === 0, last = i === n - 1;
      // Center the label on each shape's centroid, not the bounding box.
      // First (flat tail) → mass shifts toward start; last (flat head) → toward end.
      // Derived: centroid offset = ±(N·W/4 − N²/6) / (W − N/2) along the main axis.
      const pad = notchPx * 0.6;
      const shift = (notchPx * boxMain / 4 - notchPx * notchPx / 6) / (boxMain - notchPx / 2);
      const off = first ? -shift : last ? shift : 0;
      const padMainStart = pad + off; // top (vertical) / left (horizontal)
      const padMainEnd   = pad - off; // bottom / right
      let clip;
      if (vertical) {
        const top = first ? '0 0, 100% 0' : '0 0, 50% var(--notch), 100% 0';
        const bot = last ? '100% 100%, 0 100%'
                         : '100% calc(100% - var(--notch)), 50% 100%, 0 calc(100% - var(--notch))';
        clip = `polygon(${top}, ${bot})`;
        node.style.padding = `${padMainStart}px 4px ${padMainEnd}px`;
      } else {
        const head = last ? '100% 0, 100% 100%'
                          : 'calc(100% - var(--notch)) 0, 100% 50%, calc(100% - var(--notch)) 100%';
        const tail = first ? '0 100%, 0 0' : '0 100%, var(--notch) 50%, 0 0';
        clip = `polygon(0 0, ${head}, ${tail})`;
        node.style.padding = `4px ${padMainEnd}px 4px ${padMainStart}px`;
      }
      node.style.clipPath = clip;
    } else if (nodeType === 'box') {
      const w = vertical ? boxCross : boxMain;
      const h = vertical ? boxMain  : boxCross;
      node.style.width  = w + 'px';
      node.style.height = h + 'px';
      node.style.borderRadius = (Math.min(w, h) * 0.15) + 'px';
    } else if (nodeType === 'circle') {
      const d = Math.min(boxMain, boxCross);
      node.style.width  = d + 'px';
      node.style.height = d + 'px';
    } else {
      node.style.width  = boxMain + 'px';
      node.style.height = boxCross + 'px';
    }

    container.appendChild(node);
    item.style.display = 'none';
    return node;
  });

  // Font scaling — fit longest label within node along main axis
  const textMaxW = chevron
    ? (vertical ? boxCross : boxMain) - 2 * notchPx - 8
    : (nodeType === 'box' ? (vertical ? boxCross : boxMain) : Math.min(boxMain, boxCross)) - 16;
  const baseStyle    = getComputedStyle(nodeEls[0]);
  const baseFontSize = parseFloat(baseStyle.fontSize) || 17.6;
  const fontFamily   = baseStyle.fontFamily || 'sans-serif';
  const fontWeight   = baseStyle.fontWeight || '500';
  const cvs = document.createElement('canvas');
  const cctx = cvs.getContext('2d');
  cctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
  const maxTextWidth = Math.max(...nodeEls.map(el => cctx.measureText(el.textContent).width));
  if (maxTextWidth > textMaxW && maxTextWidth > 0) {
    const scaledSize = (baseFontSize * textMaxW / maxTextWidth) + 'px';
    nodeEls.forEach(el => el.style.fontSize = scaledSize);
  }

  if (n === 1) return;
  if (chevron) return; // chevron tiles convey flow themselves — no connectors

  const uid = 'cfp' + (_cfCounter++);

  if (arrowType === 'chevron') {
    // Chevron sized to fit the arrow slot between nodes
    positions.forEach((from, i) => {
      if (i === n - 1) return;
      const to = positions[i + 1];
      const mx = (from.x + to.x) / 2;
      const my = (from.y + to.y) / 2;
      const slotLen = arrowSlot * gapWeights[i + 1];
      const w = Math.min(slotLen * 0.7, boxCross * 0.7);
      const h = w * 0.78;
      const arrow = document.createElement('div');
      arrow.className = 'arrow-shape';
      arrow.style.background = arrowColor;
      arrow.style.width  = w + 'px';
      arrow.style.height = h + 'px';
      arrow.style.left   = mx + 'px';
      arrow.style.top    = my + 'px';
      const rot = vertical ? 90 : 0;
      arrow.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;
      container.appendChild(arrow);
    });
    return;
  }

  // thin / double — SVG lines with arrowheads
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.style.cssText = 'position:absolute;left:0;top:0;overflow:visible;pointer-events:none;';
  container.insertBefore(svg, container.firstChild);
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  svg.appendChild(defs);

  const markerSize = 12;
  addArrowMarker(defs, uid + '-end', arrowColor, markerSize, false);
  if (arrowType === 'double') addArrowMarker(defs, uid + '-start', arrowColor, markerSize, true);

  positions.forEach((from, i) => {
    if (i === n - 1) return;
    const to = positions[i + 1];
    // Trim line so it starts at node edge
    const halfMain = boxMain / 2;
    const trim = halfMain + 4;
    let x1, y1, x2, y2;
    if (vertical) {
      x1 = from.x; y1 = from.y + trim;
      x2 = to.x;   y2 = to.y   - trim;
    } else {
      x1 = from.x + trim; y1 = from.y;
      x2 = to.x   - trim; y2 = to.y;
    }
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.setAttribute('stroke', arrowColor);
    line.setAttribute('stroke-width', '2');
    line.setAttribute('marker-end', `url(#${uid}-end)`);
    if (arrowType === 'double') line.setAttribute('marker-start', `url(#${uid}-start)`);
    svg.appendChild(line);
  });
}

// --- Pyramid (stacked triangle bands) ---

function initPyramid(container) {
  const items = Array.from(container.querySelectorAll('.item'));
  if (items.length === 0) return;

  const n = items.length;
  const cx = 250;
  const apexY = 20, baseY = 480, H = baseY - apexY;
  const baseHalf = 230;
  const inverted = container.classList.contains('inverted');
  const hasGap = container.classList.contains('gap');
  const defaultColor = container.dataset.nodeColor || '#2e6b8a';

  container.style.position = 'relative';
  container.style.width = '500px';
  container.style.height = '500px';
  container.style.margin = '0 auto';
  container.style.display = 'block';

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '500');
  svg.setAttribute('height', '500');
  svg.style.cssText = 'position:absolute;left:0;top:0;';
  container.appendChild(svg);

  // half-width of the triangle at vertical fraction p (0 = top, 1 = bottom)
  const halfAt = p => (inverted ? (1 - p) : p) * baseHalf;

  const labelEls = [];
  const bandWidths = [];

  items.forEach((item, i) => {
    const color = item.getAttribute('color') || item.dataset.color || defaultColor;
    const itemGap = hasGap || item.classList.contains('gap');
    const inset = itemGap ? 5 : 0;

    const pTop = i / n, pBot = (i + 1) / n;
    let yTop = apexY + pTop * H + inset;
    let yBot = apexY + pBot * H - inset;
    const topHalf = halfAt(pTop);
    const botHalf = halfAt(pBot);

    const d = `M ${cx - topHalf} ${yTop} L ${cx + topHalf} ${yTop} ` +
              `L ${cx + botHalf} ${yBot} L ${cx - botHalf} ${yBot} Z`;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', color);
    if (!hasGap) {
      path.setAttribute('stroke', 'white');
      path.setAttribute('stroke-width', '3');
    }
    svg.appendChild(path);

    const ly = (yTop + yBot) / 2;
    const label = document.createElement('div');
    label.className = 'slice-label';
    label.textContent = item.textContent.trim();
    label.style.left = cx + 'px';
    label.style.top  = ly + 'px';
    container.appendChild(label);
    labelEls.push(label);

    // usable width at the label's vertical midpoint
    bandWidths.push(2 * halfAt((pTop + pBot) / 2));
    item.style.display = 'none';
  });

  // Scale each label down to fit its own band width (bands vary a lot in width)
  const baseStyle = getComputedStyle(labelEls[0]);
  const baseFontSize = parseFloat(baseStyle.fontSize) || 17.6;
  const fontFamily = baseStyle.fontFamily || 'sans-serif';
  const fontWeight = baseStyle.fontWeight || '500';
  const cvs = document.createElement('canvas');
  const cctx = cvs.getContext('2d');
  cctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
  labelEls.forEach((el, i) => {
    const textMaxW = Math.max(40, bandWidths[i] * 0.85);
    const w = cctx.measureText(el.textContent).width;
    if (w > textMaxW && w > 0) {
      el.style.fontSize = (baseFontSize * textMaxW / w) + 'px';
    }
  });
}

// --- Matrix (2x2 quadrants) ---

function initMatrix(container) {
  const items = Array.from(container.querySelectorAll('.item'));
  if (items.length === 0) return;

  const outline = container.classList.contains('outline');
  const arrows  = container.classList.contains('arrows');
  const hasGap  = container.classList.contains('gap');
  const defaultColor = container.dataset.nodeColor  || '#2e6b8a';
  const lineColor    = container.dataset.arrowColor || '#333333';

  // Square bounds (leave a gutter for axis labels/titles)
  const x0 = 70, y0 = 60, x1 = 430, y1 = 420;
  const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;

  container.style.position = 'relative';
  container.style.width = '500px';
  container.style.height = '500px';
  container.style.margin = '0 auto';
  container.style.display = 'block';

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '500');
  svg.setAttribute('height', '500');
  svg.style.cssText = 'position:absolute;left:0;top:0;overflow:visible;';
  container.appendChild(svg);
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  svg.appendChild(defs);

  // Quadrant rects in item order: TL, TR, BL, BR
  const quads = [
    { x: x0, y: y0, w: cx - x0, h: cy - y0 },
    { x: cx, y: y0, w: x1 - cx, h: cy - y0 },
    { x: x0, y: cy, w: cx - x0, h: y1 - cy },
    { x: cx, y: cy, w: x1 - cx, h: y1 - cy }
  ];
  const gapInset = 6;

  const labelEls = [];
  quads.forEach((q, i) => {
    const item = items[i];
    let rx = q.x, ry = q.y, rw = q.w, rh = q.h;
    if (hasGap) { rx += gapInset; ry += gapInset; rw -= 2 * gapInset; rh -= 2 * gapInset; }

    if (!outline) {
      const color = (item && (item.getAttribute('color') || item.dataset.color)) || defaultColor;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', rx); rect.setAttribute('y', ry);
      rect.setAttribute('width', rw); rect.setAttribute('height', rh);
      rect.setAttribute('fill', color);
      if (!hasGap) { rect.setAttribute('stroke', 'white'); rect.setAttribute('stroke-width', '3'); }
      svg.appendChild(rect);
    } else {
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', rx); rect.setAttribute('y', ry);
      rect.setAttribute('width', rw); rect.setAttribute('height', rh);
      rect.setAttribute('fill', 'none');
      rect.setAttribute('stroke', lineColor);
      rect.setAttribute('stroke-width', '2');
      svg.appendChild(rect);
    }

    if (item) {
      const label = document.createElement('div');
      label.className = 'slice-label';
      label.textContent = item.textContent.trim();
      label.style.left = (q.x + q.w / 2) + 'px';
      label.style.top  = (q.y + q.h / 2) + 'px';
      if (outline) label.style.color = '#222222';
      container.appendChild(label);
      labelEls.push(label);
      item.style.display = 'none';
    }
  });

  // Center cross lines (skipped in gap mode; outline mode draws its own cell borders)
  if (!hasGap && !outline) {
    [['v', cx, y0, cx, y1], ['h', x0, cy, x1, cy]].forEach(([, ax, ay, bx, by]) => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', ax); line.setAttribute('y1', ay);
      line.setAttribute('x2', bx); line.setAttribute('y2', by);
      line.setAttribute('stroke', lineColor);
      line.setAttribute('stroke-width', '2');
      svg.appendChild(line);
    });
  } else if (!hasGap && outline) {
    [[cx, y0, cx, y1], [x0, cy, x1, cy]].forEach(([ax, ay, bx, by]) => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', ax); line.setAttribute('y1', ay);
      line.setAttribute('x2', bx); line.setAttribute('y2', by);
      line.setAttribute('stroke', lineColor);
      line.setAttribute('stroke-width', '2');
      svg.appendChild(line);
    });
  }

  // Arrowed axes — drawn outside the square along the bottom and left edges,
  // pointing toward the "high" direction (right on x, up on y).
  if (arrows) {
    const uid = 'cfm' + (_cfCounter++);
    addArrowMarker(defs, uid + '-end', lineColor, 12, false);
    const ax = 22; // axis offset outside the square
    const axisLines = [
      [x0 - ax, y1, x0 - ax, y0],   // y-axis: bottom -> top (up = high)
      [x0, y1 + ax, x1, y1 + ax]    // x-axis: left -> right (right = high)
    ];
    axisLines.forEach(([px1, py1, px2, py2]) => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', px1); line.setAttribute('y1', py1);
      line.setAttribute('x2', px2); line.setAttribute('y2', py2);
      line.setAttribute('stroke', lineColor);
      line.setAttribute('stroke-width', '2');
      line.setAttribute('marker-end', `url(#${uid}-end)`);
      svg.appendChild(line);
    });
  }

  // Scale quadrant labels down to fit a cell (cells are equal-sized)
  const cellW = (x1 - x0) / 2 - (hasGap ? 2 * gapInset : 0);
  const textMaxW = Math.max(60, cellW * 0.85);
  if (labelEls.length) {
    const baseStyle = getComputedStyle(labelEls[0]);
    const baseFontSize = parseFloat(baseStyle.fontSize) || 17.6;
    const fontFamily = baseStyle.fontFamily || 'sans-serif';
    const fontWeight = baseStyle.fontWeight || '500';
    const cvs = document.createElement('canvas');
    const cctx = cvs.getContext('2d');
    cctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
    const maxTextWidth = Math.max(...labelEls.map(el => cctx.measureText(el.textContent).width));
    if (maxTextWidth > textMaxW && maxTextWidth > 0) {
      const scaledSize = (baseFontSize * textMaxW / maxTextWidth) + 'px';
      labelEls.forEach(el => el.style.fontSize = scaledSize);
    }
  }

  // Axis end labels (Low/High) and named axis titles
  const d = container.dataset;
  const offEnd = arrows ? 40 : 16;
  const mkEnd = (text, left, top) => {
    if (!text) return;
    const el = document.createElement('div');
    el.className = 'axis-end';
    el.textContent = text;
    el.style.left = left + 'px';
    el.style.top  = top + 'px';
    container.appendChild(el);
  };
  mkEnd(d.xLow,  x0 - offEnd, cy);
  mkEnd(d.xHigh, x1 + offEnd, cy);
  mkEnd(d.yLow,  cx, y1 + offEnd);
  mkEnd(d.yHigh, cx, y0 - offEnd);

  if (d.xAxis) {
    const el = document.createElement('div');
    el.className = 'axis-title';
    el.textContent = d.xAxis;
    el.style.left = '0';
    el.style.width = '500px';
    el.style.top = (y1 + offEnd + 20) + 'px';
    container.appendChild(el);
  }
  if (d.yAxis) {
    const el = document.createElement('div');
    el.className = 'axis-title';
    el.textContent = d.yAxis;
    el.style.left = (x0 - offEnd - 28) + 'px';
    el.style.top = cy + 'px';
    el.style.transform = 'translate(-50%, -50%) rotate(-90deg)';
    el.style.transformOrigin = 'center';
    el.style.whiteSpace = 'nowrap';
    container.appendChild(el);
  }
}

// --- Hierarchy (org chart / tree) ---

// Direct-child .item divs only (querySelectorAll would flatten the tree)
function directItemChildren(el) {
  return Array.from(el.children).filter(c => c.classList.contains('item'));
}

// A node's own label = its text excluding any nested .item children
function ownLabel(el) {
  const clone = el.cloneNode(true);
  Array.from(clone.children)
    .filter(c => c.classList.contains('item'))
    .forEach(c => clone.removeChild(c));
  return clone.textContent.trim();
}

function initHierarchy(container) {
  const roots = directItemChildren(container);
  if (roots.length === 0) return;

  const horizontal = container.classList.contains('horizontal');
  const outline = container.classList.contains('outline');
  const nodeType = container.classList.contains('node-circle') ? 'circle' :
                   container.classList.contains('node-none')   ? 'none'   : 'box';
  const defaultNodeColor = container.dataset.nodeColor  || '#2e6b8a';
  const lineColor        = container.dataset.arrowColor || '#333333';

  // Baseline geometry (pre-scale)
  const boxW = nodeType === 'circle' ? 90 : 130;
  const boxH = nodeType === 'circle' ? 90 : 54;
  const gap = 24;          // min gap between sibling subtrees (along cross axis)
  const levelGap = 56;     // gap between depth levels (along main axis)
  const level = (horizontal ? boxW : boxH) + levelGap;
  const breadth = horizontal ? boxH : boxW;  // node extent along the cross axis

  // Build tree { el, label, color, children }
  function build(el) {
    return {
      el,
      label: ownLabel(el),
      color: el.getAttribute('color') || el.dataset.color || defaultNodeColor,
      children: directItemChildren(el).map(build)
    };
  }
  const tree = roots.map(build);

  // Width pass (extent along cross axis), post-order
  function measure(node) {
    if (node.children.length === 0) { node.extent = breadth; return; }
    node.children.forEach(measure);
    const childrenExtent = node.children.reduce((s, c) => s + c.extent, 0) +
                           gap * (node.children.length - 1);
    node.extent = Math.max(breadth, childrenExtent);
  }
  tree.forEach(measure);

  // Position pass: `cross` = position along cross axis (left edge of subtree),
  // `depth` = level index. node.c = cross-axis center, node.m = main-axis center.
  let maxDepth = 0;
  function place(node, cross, depth) {
    maxDepth = Math.max(maxDepth, depth);
    node.m = depth * level + (horizontal ? boxW : boxH) / 2;
    if (node.children.length === 0) {
      node.c = cross + breadth / 2;
    } else {
      const childrenExtent = node.children.reduce((s, c) => s + c.extent, 0) +
                             gap * (node.children.length - 1);
      let cursor = cross + (node.extent - childrenExtent) / 2;
      node.children.forEach(ch => { place(ch, cursor, depth + 1); cursor += ch.extent + gap; });
      const first = node.children[0], last = node.children[node.children.length - 1];
      node.c = (first.c + last.c) / 2;
    }
  }
  // Lay the roots out side by side along the cross axis
  let rootCursor = 0;
  tree.forEach(r => { place(r, rootCursor, 0); rootCursor += r.extent + gap; });

  // Flatten and convert (cross, main) -> (x, y)
  const flat = [];
  function collect(node, parent) {
    node.parent = parent || null;
    node.x = horizontal ? node.m : node.c;
    node.y = horizontal ? node.c : node.m;
    flat.push(node);
    node.children.forEach(ch => collect(ch, node));
  }
  tree.forEach(r => collect(r, null));

  // Raw bounding box, then scale to fit a viewport
  const halfW = boxW / 2, halfH = boxH / 2;
  const minX = Math.min(...flat.map(n => n.x - halfW));
  const maxX = Math.max(...flat.map(n => n.x + halfW));
  const minY = Math.min(...flat.map(n => n.y - halfH));
  const maxY = Math.max(...flat.map(n => n.y + halfH));
  const rawW = maxX - minX, rawH = maxY - minY;

  const maxW = 900, maxH = 520;
  const scale = Math.min(maxW / rawW, maxH / rawH, 1);
  const W = rawW * scale, H = rawH * scale;
  const sx = v => (v - minX) * scale;
  const sy = v => (v - minY) * scale;

  container.style.position = 'relative';
  container.style.width = W + 'px';
  container.style.height = H + 'px';

  // SVG connectors (behind nodes)
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.style.cssText = 'position:absolute;left:0;top:0;overflow:visible;pointer-events:none;';
  container.appendChild(svg);

  flat.forEach(node => {
    if (!node.parent) return;
    const p = node.parent;
    let d;
    if (horizontal) {
      const x1 = sx(p.x + halfW), y1 = sy(p.y);
      const x2 = sx(node.x - halfW), y2 = sy(node.y);
      const mx = (x1 + x2) / 2;
      d = `M ${x1} ${y1} H ${mx} V ${y2} H ${x2}`;
    } else {
      const x1 = sx(p.x), y1 = sy(p.y + halfH);
      const x2 = sx(node.x), y2 = sy(node.y - halfH);
      const my = (y1 + y2) / 2;
      d = `M ${x1} ${y1} V ${my} H ${x2} V ${y2}`;
    }
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', lineColor);
    path.setAttribute('stroke-width', '2');
    svg.appendChild(path);
  });

  // Node divs
  const nodeEls = flat.map(node => {
    const el = document.createElement('div');
    el.className = 'node node-' + nodeType;
    el.textContent = node.label;
    if (nodeType !== 'none' && !outline) el.style.background = node.color;
    if (outline) {
      el.style.background = 'transparent';
      el.style.border = '2px solid ' + node.color;
      el.style.color = '#222222';
    }
    el.style.width  = (boxW * scale) + 'px';
    el.style.height = (boxH * scale) + 'px';
    if (nodeType === 'box') el.style.borderRadius = (Math.min(boxW, boxH) * 0.12 * scale) + 'px';
    el.style.left = sx(node.x) + 'px';
    el.style.top  = sy(node.y) + 'px';
    el.style.transform = 'translate(-50%, -50%)';
    container.appendChild(el);
    node.el.style.display = 'none';
    return el;
  });

  // Font scaling — shrink each label to fit its box (boxes are uniform width)
  const textMaxW = boxW * scale - 16;
  const baseStyle = getComputedStyle(nodeEls[0]);
  const baseFontSize = parseFloat(baseStyle.fontSize) || 17.6;
  const fontFamily = baseStyle.fontFamily || 'sans-serif';
  const fontWeight = baseStyle.fontWeight || '500';
  const cvs = document.createElement('canvas');
  const cctx = cvs.getContext('2d');
  cctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
  nodeEls.forEach(el => {
    const w = cctx.measureText(el.textContent).width;
    if (w > textMaxW && w > 0) el.style.fontSize = (baseFontSize * textMaxW / w) + 'px';
  });
}

// --- Venn (2- and 3-set overlapping circles) ---

function initVenn(container) {
  const items = Array.from(container.querySelectorAll('.item'));
  if (items.length < 2 || items.length > 3) return;  // only 2- and 3-set
  const n = items.length;

  const palette = ['#2e6b8a', '#c0584f', '#5a9367'];
  const baseColor = container.dataset.nodeColor;

  container.style.position = 'relative';
  container.style.width = '500px';
  container.style.height = '500px';
  container.style.margin = '0 auto';
  container.style.display = 'block';

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '500');
  svg.setAttribute('height', '500');
  svg.style.cssText = 'position:absolute;left:0;top:0;';
  container.appendChild(svg);

  // Circle centers/radius per set count
  const circles = n === 2
    ? [{ cx: 175, cy: 250, r: 150 }, { cx: 325, cy: 250, r: 150 }]
    : [{ cx: 250, cy: 155, r: 140 }, { cx: 320, cy: 275, r: 140 }, { cx: 180, cy: 275, r: 140 }];

  items.forEach((item, i) => {
    const color = item.getAttribute('color') || item.dataset.color || baseColor || palette[i];
    const c = circles[i];
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', c.cx);
    circle.setAttribute('cy', c.cy);
    circle.setAttribute('r', c.r);
    circle.setAttribute('fill', color);
    circle.setAttribute('fill-opacity', '0.45');
    circle.style.mixBlendMode = 'multiply';
    svg.appendChild(circle);
    item.style.display = 'none';
  });

  // Labels: set labels (from item text) + overlap labels (from container attrs)
  const setLabels = n === 2
    ? [{ x: 120, y: 250 }, { x: 380, y: 250 }]
    : [{ x: 250, y: 95 }, { x: 380, y: 330 }, { x: 120, y: 330 }];

  const overlaps = n === 2
    ? [{ key: 'ab', x: 250, y: 250 }]
    : [{ key: 'ab', x: 320, y: 200 },
       { key: 'ac', x: 180, y: 200 },
       { key: 'bc', x: 250, y: 330 },
       { key: 'abc', x: 250, y: 245 }];

  const labelEls = [];

  items.forEach((item, i) => {
    const label = document.createElement('div');
    label.className = 'set-label';
    label.textContent = item.textContent.trim();
    label.style.left = setLabels[i].x + 'px';
    label.style.top  = setLabels[i].y + 'px';
    container.appendChild(label);
    labelEls.push(label);
  });

  const overlapColor = container.dataset.overlapColor;
  overlaps.forEach(o => {
    const text = container.dataset[o.key];
    if (!text) return;
    const label = document.createElement('div');
    label.className = 'overlap-label';
    label.textContent = text;
    label.style.left = o.x + 'px';
    label.style.top  = o.y + 'px';
    if (overlapColor) label.style.color = overlapColor;
    container.appendChild(label);
  });

  // Shrink set labels so the longest fits within a circle's exclusive lobe
  const textMaxW = (n === 2 ? 150 : 130);
  const baseStyle = getComputedStyle(labelEls[0]);
  const baseFontSize = parseFloat(baseStyle.fontSize) || 17.6;
  const fontFamily = baseStyle.fontFamily || 'sans-serif';
  const fontWeight = baseStyle.fontWeight || '600';
  const cvs = document.createElement('canvas');
  const cctx = cvs.getContext('2d');
  cctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
  const maxW = Math.max(...labelEls.map(el => cctx.measureText(el.textContent).width));
  if (maxW > textMaxW && maxW > 0) {
    const scaled = (baseFontSize * textMaxW / maxW) + 'px';
    labelEls.forEach(el => el.style.fontSize = scaled);
  }
}

function initStackedVenn(container) {
  const items = Array.from(container.querySelectorAll('.item'));
  if (items.length < 2) return;  // need at least 2 circles
  const n = items.length;

  const palette = ['#c0584f', '#5a9367', '#7a5a9b', '#2e6b8a', '#b8893a'];
  const baseColor = container.dataset.nodeColor;

  const SIZE = 500;
  container.style.position = 'relative';
  container.style.width = SIZE + 'px';
  container.style.height = SIZE + 'px';
  container.style.margin = '0 auto';
  container.style.display = 'block';

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', SIZE);
  svg.setAttribute('height', SIZE);
  svg.style.cssText = 'position:absolute;left:0;top:0;';
  container.appendChild(svg);

  // Nested concentric circles sharing a common edge point (containment): the
  // first item is the largest outer circle, each later item nests inside it,
  // internally tangent at a shared point P on the outer rim. Circle i (0 =
  // outermost) has radius R·(n−i)/n and center C0 + (R−r_i)·u, where u points
  // toward the shared edge. Painted largest-first so smaller ones sit on top.
  //
  // The diagram rotates by anchoring P in any direction without rotating the
  // labels (they are upright divs). `direction=` picks an edge; `angle=` adds
  // a clockwise rotation (degrees) on top of it.
  const margin = 10;
  const cx = SIZE / 2, cy = SIZE / 2;
  const R = SIZE / 2 - margin;       // outer radius

  const dirDeg = { down: 90, up: -90, left: 180, right: 0 };
  const baseDeg = dirDeg[(container.dataset.direction || 'down').toLowerCase()] ?? 90;
  const rot = parseFloat(container.dataset.angle) || 0;
  const rad = (baseDeg + rot) * Math.PI / 180;
  const ux = Math.cos(rad), uy = Math.sin(rad);   // unit vector toward shared edge

  const radii = items.map((_, i) => R * (n - i) / n);

  items.forEach((item, i) => {
    const color = item.getAttribute('color') || item.dataset.color || baseColor || palette[i % palette.length];
    const d = R - radii[i];                       // center offset from C0 toward edge
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx + d * ux);
    circle.setAttribute('cy', cy + d * uy);
    circle.setAttribute('r', radii[i]);
    circle.setAttribute('fill', color);
    svg.appendChild(circle);
    item.style.display = 'none';
  });

  // Labels sit in each circle's exclusive crescent — the band on the far side
  // from the shared edge, between this circle's far rim and the next inner
  // circle's far rim. They are placed along the −u axis through C0 and never
  // rotated. Distance from C0 along u: dLabel = R − r_i − r_{i+1} (innermost:
  // R − r_last, i.e. the middle of its body).
  const labelEls = [];
  const labelPos = [];
  items.forEach((item, i) => {
    const dLabel = (i < n - 1) ? (R - radii[i] - radii[i + 1]) : (R - radii[i]);
    const lx = cx + dLabel * ux, ly = cy + dLabel * uy;
    const label = document.createElement('div');
    label.className = 'set-label';
    label.textContent = item.textContent.trim();
    label.style.left = lx + 'px';
    label.style.top  = ly + 'px';
    container.appendChild(label);
    labelEls.push(label);
    labelPos.push({ x: lx, y: ly });
  });

  // Per-label down-scale to fit the chord width of its circle at the label's
  // position (distance from that circle's center, projected across the rim).
  const baseStyle = getComputedStyle(labelEls[0]);
  const baseFontSize = parseFloat(baseStyle.fontSize) || 17.6;
  const fontFamily = baseStyle.fontFamily || 'sans-serif';
  const fontWeight = baseStyle.fontWeight || '600';
  const cvs = document.createElement('canvas');
  const cctx = cvs.getContext('2d');
  cctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
  labelEls.forEach((el, i) => {
    const r = radii[i];
    const d = R - r;
    const ccx = cx + d * ux, ccy = cy + d * uy;
    const dist = Math.hypot(labelPos[i].x - ccx, labelPos[i].y - ccy);
    const chord = 2 * Math.sqrt(Math.max(0, r * r - dist * dist));
    const maxW = Math.max(40, chord * 0.8);
    const w = cctx.measureText(el.textContent).width;
    if (w > maxW && w > 0) el.style.fontSize = (baseFontSize * maxW / w) + 'px';
  });
}

// --- Funnel (flat-bottomed narrowing stages) ---

function initFunnel(container) {
  const items = Array.from(container.querySelectorAll('.item'));
  if (items.length === 0) return;

  const n = items.length;
  const cx = 250;
  const topY = 20, botY = 480, H = botY - topY;
  const fullHalf = 230;
  const hasGap = container.classList.contains('gap');
  const defaultColor = container.dataset.nodeColor || '#2e6b8a';

  container.style.position = 'relative';
  container.style.width = '500px';
  container.style.height = '500px';
  container.style.margin = '0 auto';
  container.style.display = 'block';

  // Band widths: proportional to value= if any item supplies one, otherwise a
  // smooth linear narrowing from full width down to 35%.
  const rawVals = items.map(it => parseFloat(it.getAttribute('value') ?? it.dataset.value));
  const hasVals = rawVals.some(v => !isNaN(v));
  let fracs;
  if (hasVals) {
    const vals = rawVals.map(v => isNaN(v) ? 0 : v);
    const maxV = Math.max(...vals, 0);
    fracs = vals.map(v => maxV > 0 ? v / maxV : 0);
  } else {
    fracs = items.map((_, i) => n === 1 ? 1 : 1 - (i / (n - 1)) * 0.65);
  }

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '500');
  svg.setAttribute('height', '500');
  svg.style.cssText = 'position:absolute;left:0;top:0;';
  container.appendChild(svg);

  const labelEls = [];
  const bandWidths = [];

  items.forEach((item, i) => {
    const color = item.getAttribute('color') || item.dataset.color || defaultColor;
    const itemGap = hasGap || item.classList.contains('gap');
    const inset = itemGap ? 5 : 0;

    const yTop = topY + (i / n) * H + inset;
    const yBot = topY + ((i + 1) / n) * H - inset;
    // Trapezoid: top edge = this stage, bottom edge = next stage (last is a rectangle)
    const topHalf = fullHalf * fracs[i];
    const botHalf = fullHalf * (i < n - 1 ? fracs[i + 1] : fracs[i]);

    const d = `M ${cx - topHalf} ${yTop} L ${cx + topHalf} ${yTop} ` +
              `L ${cx + botHalf} ${yBot} L ${cx - botHalf} ${yBot} Z`;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', color);
    if (!hasGap) {
      path.setAttribute('stroke', 'white');
      path.setAttribute('stroke-width', '3');
    }
    svg.appendChild(path);

    const ly = (yTop + yBot) / 2;
    const label = document.createElement('div');
    label.className = 'slice-label';
    label.textContent = item.textContent.trim();
    label.style.left = cx + 'px';
    label.style.top  = ly + 'px';
    container.appendChild(label);
    labelEls.push(label);

    // usable width at the label's vertical midpoint (the narrower, bottom edge)
    bandWidths.push(2 * Math.min(topHalf, botHalf));
    item.style.display = 'none';
  });

  // Scale each label down to fit its own band width (bands vary in width)
  const baseStyle = getComputedStyle(labelEls[0]);
  const baseFontSize = parseFloat(baseStyle.fontSize) || 17.6;
  const fontFamily = baseStyle.fontFamily || 'sans-serif';
  const fontWeight = baseStyle.fontWeight || '500';
  const cvs = document.createElement('canvas');
  const cctx = cvs.getContext('2d');
  cctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
  labelEls.forEach((el, i) => {
    const textMaxW = Math.max(40, bandWidths[i] * 0.85);
    const w = cctx.measureText(el.textContent).width;
    if (w > textMaxW && w > 0) {
      el.style.fontSize = (baseFontSize * textMaxW / w) + 'px';
    }
  });
}

// --- Cycle (ring of arc-shaped arrow segments) ---

function initCycle(container) {
  const items = Array.from(container.querySelectorAll('.item'));
  if (items.length === 0) return;

  const n = items.length;
  const cx = 250, cy = 250;
  const defaultColor = container.dataset.nodeColor || '#2e6b8a';

  container.style.position = 'relative';
  container.style.width = '500px';
  container.style.height = '500px';
  container.style.margin = '0 auto';
  container.style.display = 'block';

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '500');
  svg.setAttribute('height', '500');
  svg.style.cssText = 'position:absolute;left:0;top:0;';
  container.appendChild(svg);

  const ro = 225, ri = 150;          // outer / inner radius of the ring band
  const rm = (ro + ri) / 2;          // mid radius (labels + arrow tip)
  const wing = (ro - ri) * 0.45;     // how far the arrowhead overhangs the band
  const step = 2 * Math.PI / n;      // angular span per segment
  const gapAngle = Math.min(step * 0.18, 0.22);  // gap between segments (centered)
  const headAngle = Math.min(step * 0.28, 0.4);  // angular length of the arrowhead
  const start = -Math.PI / 2;        // first segment begins at the top
  const p = (r, a) => `${cx + r * Math.cos(a)} ${cy + r * Math.sin(a)}`;

  const labelEls = [];
  const labelArc = [];

  items.forEach((item, i) => {
    const color = item.getAttribute('color') || item.dataset.color || defaultColor;
    const a0 = start + i * step + gapAngle / 2;        // trailing edge of the band
    const a1 = start + (i + 1) * step - gapAngle / 2;  // arrowhead tip
    const aBody = a1 - headAngle;                      // where the body ends / head begins
    const largeArc = (aBody - a0) > Math.PI ? 1 : 0;

    // Body is a constant-width arc band; the head is a triangle whose wings
    // overhang both rims and taper to a tip at the mid radius.
    const d = [
      `M ${p(ro, a0)}`,
      `A ${ro} ${ro} 0 ${largeArc} 1 ${p(ro, aBody)}`,
      `L ${p(ro + wing, aBody)}`,
      `L ${p(rm, a1)}`,
      `L ${p(ri - wing, aBody)}`,
      `L ${p(ri, aBody)}`,
      `A ${ri} ${ri} 0 ${largeArc} 0 ${p(ri, a0)}`,
      'Z'
    ].join(' ');

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', color);
    svg.appendChild(path);

    const aMid = (a0 + aBody) / 2;
    const lx = cx + rm * Math.cos(aMid), ly = cy + rm * Math.sin(aMid);
    const label = document.createElement('div');
    label.className = 'slice-label';
    label.textContent = item.textContent.trim();
    label.style.left = lx + 'px';
    label.style.top  = ly + 'px';
    container.appendChild(label);
    labelEls.push(label);
    labelArc.push(aBody - a0);
    item.style.display = 'none';
  });

  // Scale labels to fit the arc length of the band body (minus the head)
  const baseStyle = getComputedStyle(labelEls[0]);
  const baseFontSize = parseFloat(baseStyle.fontSize) || 17.6;
  const fontFamily = baseStyle.fontFamily || 'sans-serif';
  const fontWeight = baseStyle.fontWeight || '500';
  const cvs = document.createElement('canvas');
  const cctx = cvs.getContext('2d');
  cctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
  labelEls.forEach((el, i) => {
    const textMaxW = Math.max(40, rm * labelArc[i] * 0.85);
    const w = cctx.measureText(el.textContent).width;
    if (w > textMaxW && w > 0) {
      el.style.fontSize = (baseFontSize * textMaxW / w) + 'px';
    }
  });
}
